<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XAVSAY SAS</title>
  <meta name="description" content="XAVSAY SAS — Societe par Actions Simplifiee specialisee dans l'innovation digitale et le developpement de solutions technologiques.">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cyan: #00d4ff;
      --magenta: #c026d3;
      --purple: #7c3aed;
      --dark: #0f172a;
      --gray: #64748b;
      --light-gray: #f1f5f9;
      --white: #ffffff;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--dark);
      background: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Hero ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 2rem 6rem;
      text-align: center;
    }

    .logo {
      width: 180px;
      height: auto;
      margin-bottom: 2.5rem;
      transition: transform 0.3s ease;
    }

    .logo:hover {
      transform: scale(1.03);
    }

    .company-name {
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--cyan), var(--magenta), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.6rem;
    }

    .legal {
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--gray);
      letter-spacing: 0.08em;
      margin-bottom: 0.8rem;
    }

    .tagline {
      font-size: 1rem;
      font-weight: 300;
      color: var(--gray);
      max-width: 420px;
      line-height: 1.7;
    }

    /* ── Divider ── */
    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(135deg, var(--cyan), var(--magenta), var(--purple));
      border: none;
      margin: 2.5rem auto;
      border-radius: 1px;
    }

    /* ── Contact ── */
    .contact {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.1rem;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.92rem;
      color: var(--gray);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    a.contact-item:hover {
      color: var(--dark);
    }

    .contact-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      stroke: var(--magenta);
      opacity: 0.65;
    }

    /* ── Footer ── */
    footer {
      padding: 2rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--gray);
      border-top: 1px solid var(--light-gray);
      opacity: 0.7;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .hero { padding: 3rem 1.5rem 4rem; }
      .logo { width: 140px; }
      .company-name { font-size: 0.85rem; }
      .tagline { font-size: 0.92rem; }
      .contact-item { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <main class="hero">

    <!-- Logo : remplacer logo-xavsay.png par le vrai fichier -->
    <img src="logo-xavsay.png" alt="XAVSAY" class="logo">

    <p class="tagline">Innovation digitale &amp; solutions technologiques</p>

    <hr class="divider">

    <div class="contact">

      <!-- Adresse (placeholder — a remplacer) -->
      <a href="https://maps.google.com/?q=12+Rue+de+la+Paix+75002+Paris" target="_blank" rel="noopener" class="contact-item">
        <svg class="contact-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/>
        </svg>
        12 Rue de la Paix, 75002 Paris

      <!-- Telephone (placeholder — a remplacer) -->

          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z"/>

        +33 6 00 00 00 00

      <!-- Email (placeholder — a remplacer) -->
      <a href="mailto:contact@xavsay.com" class="contact-item">
        <svg class="contact-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/>
        </svg>

    </div>
  </main>

  <footer>
    &copy; 2026 XAVSAY SAS &mdash; Tous droits reserves
  </footer>

</body>
</html>
